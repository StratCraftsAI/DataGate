name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run parser on sample CSV
        run: python3 scripts/ingest_data.py --input tests/fixtures/sample.csv

      - name: Run parser on sample JSON
        run: python3 scripts/ingest_data.py --input tests/fixtures/sample.json

      - name: Run tests
        run: python3 -m pytest tests/ -v
